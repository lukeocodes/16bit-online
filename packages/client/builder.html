<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>16Bit Online — World Builder</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: #eee; }
      /* Game canvas ONLY. Picker/toolbar canvases inherit sizes from their
         own rules below. */
      body > canvas {
        display: block; width: 100vw !important; height: 100vh !important;
        image-rendering: pixelated; image-rendering: crisp-edges;
        touch-action: none;
      }
      /* Explicit pixelated rendering for every canvas so thumbnails stay
         crisp when upscaled. */
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

      /* ----- Loading overlay ----- */
      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0a0a0a; color: #fff;
        font-family: monospace; font-size: 14px; gap: 12px;
        z-index: 1000;
      }
      #loading.hidden { display: none; }
      #loading-bar-wrap {
        width: 200px; height: 8px; background: #222; border: 1px solid #444;
      }
      #loading-bar { height: 100%; background: #5aff5a; width: 0%; transition: width 0.2s; }

      /* ----- Top bar (zone name + mode) ----- */
      #topbar {
        position: fixed; top: 0; left: 0; right: 0;
        padding: 8px 14px; display: flex; align-items: center; gap: 16px;
        background: rgba(0,0,0,0.55); border-bottom: 1px solid rgba(255,255,255,0.08);
        font-size: 13px; z-index: 10;
        pointer-events: none;
      }
      #topbar > * { pointer-events: auto; }
      #topbar .title { font-weight: 600; letter-spacing: 0.3px; }
      #topbar .zone  { opacity: 0.8; }
      #topbar .mode  {
        padding: 2px 8px; border-radius: 3px; background: #2a6; color: #000;
        font-weight: 600; font-size: 11px; text-transform: uppercase;
      }
      #topbar .mode.delete { background: #e44; color: #fff; }
      #topbar .mode.block  { background: #5ab3ff; color: #000; }
      #topbar .hint { margin-left: auto; opacity: 0.55; font-size: 11px; }

      /* ----- Toolbar (bottom) ----- */
      #toolbar {
        position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
        display: flex; gap: 6px;
        background: rgba(0,0,0,0.7); padding: 6px;
        border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
        z-index: 10;
      }
      #toolbar button {
        background: #222; color: #eee; border: 1px solid #444;
        padding: 6px 12px; font-size: 12px; cursor: pointer; border-radius: 3px;
        font-family: inherit;
      }
      #toolbar button:hover { background: #333; }
      #toolbar button.active { background: #2a6; color: #000; border-color: #2a6; }
      #toolbar button.danger.active { background: #e44; color: #fff; border-color: #e44; }
      #toolbar button.accent.active { background: #5ab3ff; color: #000; border-color: #5ab3ff; }
      #toolbar .sep { width: 1px; background: #444; }
      #toolbar .layer-group { display: flex; gap: 2px; background: #111; padding: 2px; border-radius: 3px; }
      #toolbar .brush-preview {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; background: #111; border-radius: 3px; font-size: 11px;
      }
      #toolbar .brush-preview canvas {
        width: 32px; height: 32px; image-rendering: pixelated;
        border: 1px solid #444; background: repeating-conic-gradient(#2b2b2b 0 25%, #1e1e1e 0 50%) 0 0/8px 8px;
      }
      #toolbar .brush-preview .none { opacity: 0.5; font-style: italic; }

      /* ----- Command input ----- */
      #cmdbar {
        position: fixed; left: 50%; top: 50px; transform: translateX(-50%);
        display: none; z-index: 20;
      }
      #cmdbar.open { display: block; }
      #cmdbar input {
        width: 420px; padding: 8px 12px; font-size: 14px;
        background: rgba(0,0,0,0.85); color: #fff; border: 1px solid #666;
        font-family: monospace; border-radius: 4px;
      }
      #cmdbar input:focus { outline: none; border-color: #5af; }

      /* ----- Tile picker modal ----- */
      #picker {
        position: fixed; inset: 20px; display: none; flex-direction: column;
        background: rgba(10,10,10,0.96); border: 1px solid #333; border-radius: 8px;
        z-index: 30; overflow: hidden;
      }
      #picker.open { display: flex; }
      #picker-head {
        display: flex; align-items: center; gap: 12px; padding: 10px 16px;
        border-bottom: 1px solid #333;
      }
      #picker-head h2 { font-size: 14px; margin: 0; letter-spacing: 0.3px; }
      #picker-head input {
        flex: 1; padding: 6px 10px; background: #1a1a1a; color: #eee;
        border: 1px solid #444; border-radius: 4px; font-size: 13px;
      }
      #picker-head input:focus { outline: none; border-color: #5af; }
      #picker-head .close {
        background: #333; color: #fff; border: 0; padding: 6px 10px;
        border-radius: 4px; cursor: pointer; font-size: 13px;
      }
      #picker-body { flex: 1; display: flex; overflow: hidden; }
      #picker-cats {
        width: 220px; overflow-y: auto; border-right: 1px solid #333;
        background: rgba(0,0,0,0.3);
      }
      #picker-cats .cat {
        padding: 8px 14px; cursor: pointer; font-size: 12px;
        border-bottom: 1px solid #1a1a1a;
      }
      #picker-cats .cat:hover { background: rgba(255,255,255,0.04); }
      #picker-cats .cat.active { background: rgba(90,170,255,0.15); color: #9cf; }
      #picker-cats .cat .count { float: right; opacity: 0.5; font-size: 10px; }
      #picker-grid {
        flex: 1; overflow-y: auto; padding: 12px;
        display: grid; grid-template-columns: repeat(auto-fill, 68px);
        grid-auto-rows: 68px;
        gap: 6px; align-content: start; justify-content: start;
      }
      #picker-grid .tile {
        position: relative; width: 68px; height: 68px;
        background: repeating-conic-gradient(#2b2b2b 0 25%, #1e1e1e 0 50%) 0 0/8px 8px;
        border: 1px solid #333; border-radius: 3px; cursor: pointer;
        overflow: hidden; display: flex; align-items: center; justify-content: center;
      }
      #picker-grid .tile:hover { border-color: #5af; }
      #picker-grid .tile.selected { border-color: #2a6; background-color: rgba(42,170,102,0.15); }
      #picker-grid .tile canvas {
        image-rendering: pixelated;
        max-width: 64px; max-height: 64px;
      }
      #picker-grid .tile .badge {
        position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7);
        color: #fc0; font-size: 8px; padding: 1px 3px; border-radius: 2px;
        pointer-events: none;
      }
      #picker-empty {
        flex: 1; display: flex; align-items: center; justify-content: center;
        color: #666; font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div style="font-weight:600;letter-spacing:1px">WORLD BUILDER</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      <div id="loading-text">Connecting...</div>
    </div>

    <div id="topbar">
      <div class="title">BUILDER</div>
      <div class="zone" id="topbar-zone">—</div>
      <div class="mode" id="topbar-mode">PLACE</div>
      <div class="hint">click=select · B tiles · E erase · K blocks · R rotate · Del remove · shift+click=lift · / cmd · Esc</div>
    </div>

    <div id="toolbar">
      <button id="btn-tiles" title="Open tile picker (B)">Tiles</button>
      <button id="btn-erase" class="danger" title="Delete mode (E)">Erase</button>
      <button id="btn-blocks" class="accent" title="Block (collision) mode (K)">Blocks</button>
      <button id="btn-rotate" title="Rotate brush 90° (R)">Rotate</button>
      <span class="sep"></span>
      <div class="layer-group" id="layer-group">
        <button data-layer="ground"  class="active">Ground</button>
        <button data-layer="decor">Decor</button>
        <button data-layer="walls">Walls</button>
        <button data-layer="canopy">Canopy</button>
      </div>
      <span class="sep"></span>
      <div class="brush-preview" id="brush-preview">
        <canvas width="16" height="16"></canvas>
        <span class="none" id="brush-label">none</span>
      </div>
      <span class="sep"></span>
      <button id="btn-cmd" title="Command (/)">/cmd</button>
    </div>

    <div id="cmdbar">
      <input id="cmdbar-input" type="text" placeholder="/newmap 48 32 my-map   or   /goto heaven   or   /maps" />
    </div>

    <div id="picker">
      <div id="picker-head">
        <h2>Tile library</h2>
        <input id="picker-search" type="text" placeholder="Search tiles, tilesets, category…" />
        <button class="close" id="picker-close">Close</button>
      </div>
      <div id="picker-body">
        <div id="picker-cats"></div>
        <div id="picker-grid"></div>
      </div>
    </div>

    <script type="module" src="/src/builder/main.ts"></script>
  </body>
</html>
