<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Isometric MMO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    #render-canvas { width: 100%; height: 100%; display: block; outline: none; touch-action: none; }
    #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #ui-overlay > * { pointer-events: auto; }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="render-canvas"></canvas>
    <div id="ui-overlay"></div>
  </div>
  <script>
    // Lock layout against browser zoom — apply inverse scale to #app so canvas + UI move together.
    // Chrome/Edge: outerWidth/innerWidth gives the zoom factor directly.
    // Firefox: devicePixelRatio drifts with zoom; compare against baseline set at init.
    const basePixelRatio = window.devicePixelRatio || 1;
    const root = document.getElementById('app');

    function lockZoom() {
      const chromeZoom = window.outerWidth / window.innerWidth;
      const ffZoom = (window.devicePixelRatio || 1) / basePixelRatio;
      // outerWidth/innerWidth is reliable on Chrome; falls back to dpr ratio on Firefox
      const zoom = (window.outerWidth > 0 && chromeZoom > 0.1) ? chromeZoom : ffZoom;
      const inv = 1 / zoom;
      root.style.transform = `scale(${inv})`;
      root.style.transformOrigin = 'top left';
      root.style.width = `${window.innerWidth * zoom}px`;
      root.style.height = `${window.innerHeight * zoom}px`;
    }

    window.addEventListener('resize', lockZoom);
    lockZoom();

    // Also block Ctrl+scroll and touch pinch as a belt-and-suspenders measure
    document.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
