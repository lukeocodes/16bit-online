<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Workbench</title>
  <style>
    /* ─── Design tokens ─── */
    :root {
      --bg:          #0d1117;
      --panel-bg:    #161b22;
      --border:      #30363d;
      --border-subtle: #21262d;
      --accent:      #13ef93;
      --accent-dk:   #0bc472;
      --accent-dim:  rgba(19,239,147,0.12);
      --accent-dim2: rgba(19,239,147,0.22);
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --text-faint:  #484f58;
      --danger:      #f85149;
      --warn:        #d29922;
      --canvas-bg:   #0d1117;
      --input-bg:    #0d1117;
      --hover-bg:    #1c2128;
      --active-bg:   #1a2332;
      --radius:      6px;
      --radius-sm:   4px;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Top bar ─── */
    #top-bar {
      height: 40px;
      min-height: 40px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 10;
      flex-shrink: 0;
    }
    #top-bar .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    #top-bar .logo span {
      color: var(--text-muted);
      font-weight: 400;
    }
    #top-bar .spacer { flex: 1; }
    .server-status {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .server-status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
    }
    .server-status.online .dot { background: var(--accent); }
    .server-status.offline .dot { background: var(--danger); }

    /* ─── Main layout ─── */
    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Left panel ─── */
    #model-nav {
      width: 280px;
      min-width: 280px;
      background: var(--panel-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #nav-header {
      padding: 12px 12px 8px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    #nav-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #nav-search {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 5px 8px;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    #nav-search:focus { border-color: var(--accent); }
    #nav-search::placeholder { color: var(--text-faint); }
    #nav-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .filter-chip {
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 10px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    #nav-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    #nav-list::-webkit-scrollbar { width: 4px; }
    #nav-list::-webkit-scrollbar-track { background: transparent; }
    #nav-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .nav-section-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 12px 4px;
    }
    .nav-section-label.db-section { color: var(--warn); }
    .model-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-radius: 0;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: background 0.1s, color 0.1s;
    }
    .model-btn:hover { background: var(--hover-bg); color: var(--text); }
    .model-btn.active {
      background: var(--active-bg);
      color: var(--accent);
    }
    .model-btn .model-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .model-btn.db-model .model-badge {
      border-color: var(--warn);
      color: var(--warn);
    }

    /* ─── Centre panel ─── */
    #centre-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--canvas-bg);
      min-width: 0;
    }

    /* Centre toolbar */
    #centre-toolbar {
      height: 36px;
      min-height: 36px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
      flex-shrink: 0;
    }
    .toolbar-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    /* Peace/Attack toggle */
    #anim-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .anim-toggle-btn {
      padding: 4px 10px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .anim-toggle-btn.active {
      background: var(--accent-dim2);
      color: var(--accent);
      font-weight: 700;
    }
    .anim-toggle-btn:hover:not(.active) { background: var(--hover-bg); color: var(--text); }
    /* Attack sub-mode */
    #attack-submode {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    #attack-submode.hidden { display: none; }
    .submode-btn {
      padding: 4px 9px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .submode-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .submode-btn:hover:not(.active) { background: var(--hover-bg); color: var(--text); }

    #centre-toolbar .spacer { flex: 1; }

    /* Quality selector */
    #quality-select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 11px;
      padding: 3px 6px;
      outline: none;
      cursor: pointer;
    }
    #quality-select:focus { border-color: var(--accent); }

    /* ─── Direction grid (compass rose) ─── */
    #dir-grid-area {
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }
    #dir-grid-label {
      font-size: 9px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    #dir-grid {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 4px;
      width: fit-content;
    }
    .dir-cell {
      position: relative;
      background: var(--panel-bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      overflow: hidden;
      user-select: none;
    }
    .dir-cell:hover { border-color: var(--border); background: var(--hover-bg); }
    .dir-cell.active {
      border-color: var(--accent);
      background: var(--active-bg);
    }
    .dir-cell.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
      pointer-events: none;
    }
    .dir-cell canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .dir-label {
      font-size: 9px;
      color: var(--text-faint);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 1;
      position: relative;
    }
    .dir-cell.active .dir-label { color: var(--accent); }

    /* ─── Selected preview + frame scrubber ─── */
    #preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 8px 16px 12px;
      overflow: hidden;
    }
    #preview-label {
      font-size: 9px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      align-self: flex-start;
    }
    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      overflow: hidden;
    }
    #canvas-area canvas { max-height: 100%; max-width: 100%; }

    /* Frame scrubber */
    #frame-scrubber {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .scrub-label {
      font-size: 9px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      min-width: 40px;
    }
    .frame-thumb {
      flex: 1;
      height: 40px;
      background: var(--panel-bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-faint);
      transition: border-color 0.1s, background 0.1s;
    }
    .frame-thumb:hover { border-color: var(--border); background: var(--hover-bg); }
    .frame-thumb.active {
      border-color: var(--accent);
      background: var(--active-bg);
      color: var(--accent);
    }
    .frame-thumb.frozen { border-color: var(--warn) !important; }

    /* ─── Right panel ─── */
    #config-panel {
      width: 320px;
      min-width: 320px;
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #config-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    #config-header h2 {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    #config-header .subtitle {
      font-size: 10px;
      color: var(--text-muted);
    }
    #config-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px 16px;
    }
    #config-scroll::-webkit-scrollbar { width: 4px; }
    #config-scroll::-webkit-scrollbar-track { background: transparent; }
    #config-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Config sections */
    .cfg-section {
      margin-bottom: 18px;
    }
    .cfg-section-title {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .cfg-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .cfg-row label {
      min-width: 72px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .cfg-row .cfg-value {
      font-size: 10px;
      color: var(--text-faint);
      min-width: 30px;
      text-align: right;
    }

    /* Input components */
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      height: 4px;
      cursor: pointer;
    }
    input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: none;
      cursor: pointer;
      padding: 2px;
    }
    input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
    input[type="text"], input[type="search"] {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 8px;
      outline: none;
    }
    input[type="text"]:focus, input[type="search"]:focus { border-color: var(--accent); }

    select {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 6px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }

    /* Slot picker */
    .slot-picker-wrap {
      flex: 1;
      position: relative;
    }
    .slot-picker-trigger {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 8px;
      cursor: pointer;
      color: var(--text);
      font-size: 11px;
      font-family: inherit;
      transition: border-color 0.1s;
    }
    .slot-picker-trigger:hover { border-color: var(--border); }
    .slot-picker-trigger:focus { outline: none; border-color: var(--accent); }
    .slot-picker-trigger .picker-value { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slot-picker-trigger .picker-clear {
      color: var(--text-faint);
      font-size: 12px;
      line-height: 1;
      padding: 0 2px;
    }
    .slot-picker-trigger .picker-clear:hover { color: var(--danger); }

    .slot-picker-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-height: 280px;
      display: flex;
      flex-direction: column;
    }
    .slot-picker-dropdown.hidden { display: none; }
    .picker-search {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .picker-search input {
      width: 100%;
    }
    .picker-list {
      flex: 1;
      overflow-y: auto;
    }
    .picker-list::-webkit-scrollbar { width: 4px; }
    .picker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .picker-group-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 8px 2px;
    }
    .picker-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      transition: background 0.1s, color 0.1s;
    }
    .picker-option:hover { background: var(--hover-bg); color: var(--text); }
    .picker-option.active { background: var(--active-bg); color: var(--accent); }
    .picker-option.none-opt { color: var(--text-faint); font-style: italic; }
    .picker-option .db-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 6px;
      border: 1px solid var(--warn);
      color: var(--warn);
    }

    /* Buttons */
    .btn {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d1117;
    }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-secondary {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-secondary:hover { background: var(--hover-bg); color: var(--text); border-color: var(--accent); }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--danger);
    }
    .btn-danger:hover { background: rgba(248,81,73,0.1); }
    .btn-sm { padding: 4px 8px; font-size: 10px; }

    /* Save/load section */
    .save-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .save-row input[type="text"] { flex: 1; }

    /* DB model list */
    .db-model-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .db-model-item:last-child { border-bottom: none; }
    .db-model-item .item-name {
      flex: 1;
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Radio group */
    .radio-group {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      background: transparent;
      transition: all 0.1s;
    }
    .radio-group label:hover { background: var(--hover-bg); color: var(--text); }
    .radio-group input[type="radio"] { display: none; }
    .radio-group input:checked + span { color: var(--accent); font-weight: 700; }
    .radio-group input:checked ~ * { color: var(--accent); }
    .radio-group label:has(input:checked) {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Divider */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 12px 0;
    }

    /* Offline notice */
    .offline-notice {
      font-size: 10px;
      color: var(--warn);
      background: rgba(210,153,34,0.1);
      border: 1px solid rgba(210,153,34,0.3);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      margin-bottom: 8px;
    }

    /* Animation controls */
    .anim-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Checkerboard (for transparent bg) */
    .checkerboard {
      background-image: linear-gradient(45deg, #1c1c1c 25%, transparent 25%),
                        linear-gradient(-45deg, #1c1c1c 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #1c1c1c 75%),
                        linear-gradient(-45deg, transparent 75%, #1c1c1c 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      background-color: #141414;
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div id="top-bar">
    <div class="logo">MODEL WORKBENCH <span>v2</span></div>
    <div class="spacer"></div>
    <div class="server-status" id="server-status">
      <div class="dot"></div>
      <span id="server-status-text">Checking server...</span>
    </div>
  </div>

  <!-- Three-column layout -->
  <div id="layout">
    <!-- Left: model browser -->
    <div id="model-nav">
      <div id="nav-header">
        <div id="nav-title">Models <span id="nav-count" style="color:var(--text-faint);font-weight:400;"></span></div>
        <input id="nav-search" type="search" placeholder="Search models..." autocomplete="off" />
        <div id="nav-filters"></div>
      </div>
      <div id="nav-list"></div>
    </div>

    <!-- Centre: animation preview -->
    <div id="centre-panel">
      <div id="centre-toolbar">
        <span class="toolbar-label">Anim</span>
        <div id="anim-toggle">
          <button class="anim-toggle-btn active" data-mode="peace">PEACE</button>
          <button class="anim-toggle-btn" data-mode="attack">ATTACK</button>
        </div>
        <div id="attack-submode" class="hidden">
          <button class="submode-btn active" data-sub="stationary">Stationary</button>
          <button class="submode-btn" data-sub="moving">Moving</button>
        </div>
        <div class="spacer"></div>
        <span class="toolbar-label">Quality</span>
        <select id="quality-select">
          <option value="low">Low (2×)</option>
          <option value="medium">Med (3×)</option>
          <option value="high" selected>High (4×)</option>
          <option value="ultra">Ultra (6×)</option>
        </select>
      </div>

      <!-- Compass rose direction grid -->
      <div id="dir-grid-area">
        <div id="dir-grid-label">8 DIRECTIONS — click to select</div>
        <div id="dir-grid">
          <!-- Filled by JS in compass rose order: NW N NE / W [C] E / SW S SE -->
          <!-- JS uses DIR_GRID mapping: row/col → direction index -->
        </div>
      </div>

      <!-- Large selected preview -->
      <div id="preview-area">
        <div id="preview-label">SELECTED DIRECTION</div>
        <div id="canvas-area" class="checkerboard"></div>
        <div id="frame-scrubber"></div>
      </div>
    </div>

    <!-- Right: inspector -->
    <div id="config-panel">
      <div id="config-header">
        <h2 id="config-title">Composite</h2>
        <div class="subtitle" id="config-subtitle">Human Body</div>
      </div>
      <div id="config-scroll"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
