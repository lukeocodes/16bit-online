<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Model Workbench</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Left nav: model browser ─── */
    #model-nav {
      width: 200px;
      background: #0f3460;
      padding: 12px;
      overflow-y: auto;
      border-right: 1px solid #1a1a4e;
    }
    #model-nav h3 {
      font-size: 10px;
      color: #53a8b6;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 12px 0 4px;
    }
    #model-nav h3:first-child { margin-top: 0; }
    #model-nav .model-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: #1a1a2e;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 5px 8px;
      margin: 2px 0;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    #model-nav .model-btn:hover { background: #222; color: #fff; }
    #model-nav .model-btn.active {
      background: #1a2a4e;
      border-color: #53a8b6;
      color: #53a8b6;
      font-weight: 600;
    }

    /* ─── Middle: canvas ─── */
    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #16213e;
    }

    /* ─── Right nav: config panel ─── */
    #config-panel {
      width: 260px;
      background: #0f3460;
      padding: 12px;
      overflow-y: auto;
      border-left: 1px solid #1a1a4e;
    }
    #config-panel h2 {
      font-size: 13px;
      color: #53a8b6;
      margin: 14px 0 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #config-panel h2:first-child { margin-top: 0; }

    /* ─── Shared control styles ─── */
    .control-group {
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .control-group label {
      min-width: 65px;
      color: #aaa;
      font-size: 12px;
    }
    .control-group select, .control-group input[type="range"] {
      flex: 1;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }
    .control-group input[type="color"] {
      width: 32px;
      height: 24px;
      border: 1px solid #333;
      border-radius: 4px;
      background: none;
      cursor: pointer;
    }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-bottom: 6px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 3px;
      background: #1a1a2e;
      border: 1px solid #333;
      font-size: 12px;
      transition: background 0.15s;
    }
    .radio-group label:hover { background: #222; }
    .radio-group input:checked + span { color: #53a8b6; font-weight: 600; }
    .radio-group input { display: none; }
    button {
      background: #53a8b6;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    button:hover { background: #6bc5d2; }
    .section-divider {
      border-top: 1px solid #1a1a4e;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div id="model-nav"></div>
  <div id="canvas-area"></div>
  <div id="config-panel"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
